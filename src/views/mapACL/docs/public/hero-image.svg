<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8E6F0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Map Background -->
  <rect width="800" height="600" fill="url(#mapBg)"/>
  
  <!-- Map Grid Lines (subtle) -->
  <g opacity="0.15" stroke="#2D3748" stroke-width="1">
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
  </g>
  
  <!-- Water Areas (Rivers/Lakes) -->
  <path d="M 50 200 Q 150 180, 250 200 Q 350 220, 450 200 Q 550 180, 650 200 L 650 250 Q 550 270, 450 250 Q 350 230, 250 250 Q 150 270, 50 250 Z" 
        fill="#5DADE2" opacity="0.4"/>
  <path d="M 600 350 Q 650 340, 700 350 Q 750 360, 780 350 L 780 400 Q 750 390, 700 400 Q 650 410, 600 400 Z" 
        fill="#5DADE2" opacity="0.4"/>
  
  <!-- Park/Green Areas -->
  <ellipse cx="150" cy="400" rx="80" ry="60" fill="#52C41A" opacity="0.3"/>
  <ellipse cx="650" cy="480" rx="90" ry="70" fill="#52C41A" opacity="0.3"/>
  
  <!-- Roads Network -->
  <g opacity="0.6">
    <!-- Main Roads (wider) -->
    <line x1="0" y1="300" x2="800" y2="300" stroke="#FFA500" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#FFA500" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Secondary Roads -->
    <path d="M 0 150 L 300 150 L 400 250" stroke="#FFD700" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 400 350 L 550 450 L 700 450" stroke="#FFD700" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 200 0 L 200 200 L 300 300" stroke="#FFD700" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 600 100 L 600 250 L 500 300" stroke="#FFD700" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
  
  <!-- Buildings/Blocks -->
  <g opacity="0.4" fill="#95A5A6">
    <rect x="80" y="120" width="40" height="30" rx="2"/>
    <rect x="520" y="180" width="35" height="40" rx="2"/>
    <rect x="280" y="380" width="45" height="35" rx="2"/>
    <rect x="680" y="270" width="38" height="42" rx="2"/>
    <rect x="150" y="520" width="40" height="30" rx="2"/>
    <rect x="480" y="80" width="35" height="35" rx="2"/>
  </g>
  
  <!-- Map Markers (Location Pins) with Glow Effect -->
  <g filter="url(#glow)">
    <!-- Red Marker -->
    <g transform="translate(400, 280)">
      <ellipse cx="0" cy="25" rx="12" ry="4" fill="#000" opacity="0.2"/>
      <path d="M 0 0 C -8 0, -15 6, -15 15 C -15 25, 0 35, 0 35 C 0 35, 15 25, 15 15 C 15 6, 8 0, 0 0 Z" 
            fill="#FF4757" stroke="#fff" stroke-width="2"/>
      <circle cx="0" cy="12" r="5" fill="#fff"/>
    </g>
    
    <!-- Blue Marker -->
    <g transform="translate(200, 150)">
      <ellipse cx="0" cy="18" rx="9" ry="3" fill="#000" opacity="0.2"/>
      <path d="M 0 0 C -6 0, -11 4, -11 11 C -11 18, 0 26, 0 26 C 0 26, 11 18, 11 11 C 11 4, 6 0, 0 0 Z" 
            fill="#4B98FA" stroke="#fff" stroke-width="1.5"/>
      <circle cx="0" cy="9" r="3.5" fill="#fff"/>
    </g>
    
    <!-- Green Marker -->
    <g transform="translate(600, 250)">
      <ellipse cx="0" cy="18" rx="9" ry="3" fill="#000" opacity="0.2"/>
      <path d="M 0 0 C -6 0, -11 4, -11 11 C -11 18, 0 26, 0 26 C 0 26, 11 18, 11 11 C 11 4, 6 0, 0 0 Z" 
            fill="#52C41A" stroke="#fff" stroke-width="1.5"/>
      <circle cx="0" cy="9" r="3.5" fill="#fff"/>
    </g>
    
    <!-- Purple Marker -->
    <g transform="translate(550, 450)">
      <ellipse cx="0" cy="18" rx="9" ry="3" fill="#000" opacity="0.2"/>
      <path d="M 0 0 C -6 0, -11 4, -11 11 C -11 18, 0 26, 0 26 C 0 26, 11 18, 11 11 C 11 4, 6 0, 0 0 Z" 
            fill="#A855F7" stroke="#fff" stroke-width="1.5"/>
      <circle cx="0" cy="9" r="3.5" fill="#fff"/>
    </g>
    
    <!-- Orange Marker -->
    <g transform="translate(680, 450)">
      <ellipse cx="0" cy="18" rx="9" ry="3" fill="#000" opacity="0.2"/>
      <path d="M 0 0 C -6 0, -11 4, -11 11 C -11 18, 0 26, 0 26 C 0 26, 11 18, 11 11 C 11 4, 6 0, 0 0 Z" 
            fill="#F97316" stroke="#fff" stroke-width="1.5"/>
      <circle cx="0" cy="9" r="3.5" fill="#fff"/>
    </g>
  </g>
  
  <!-- Polygon Area (with border) -->
  <path d="M 250 400 L 320 380 L 350 420 L 320 460 L 260 450 Z" 
        fill="#4B98FA" opacity="0.2" stroke="#4B98FA" stroke-width="3" stroke-dasharray="8,4"/>
  
  <!-- Route Line (animated path) -->
  <path d="M 200 150 Q 300 200, 400 280 Q 500 350, 550 450" 
        fill="none" stroke="#FF4757" stroke-width="4" stroke-linecap="round" 
        stroke-dasharray="10,5" opacity="0.8"/>
  
  <!-- Cluster Indicators -->
  <g>
    <!-- Cluster 1 -->
    <circle cx="150" cy="400" r="30" fill="#4B98FA" opacity="0.3" filter="url(#shadow)"/>
    <circle cx="150" cy="400" r="20" fill="#4B98FA" opacity="0.5"/>
    <text x="150" y="407" font-family="Arial, sans-serif" font-size="16" fill="white" 
          text-anchor="middle" font-weight="bold">8</text>
    
    <!-- Cluster 2 -->
    <circle cx="650" cy="480" r="28" fill="#52C41A" opacity="0.3" filter="url(#shadow)"/>
    <circle cx="650" cy="480" r="18" fill="#52C41A" opacity="0.5"/>
    <text x="650" y="487" font-family="Arial, sans-serif" font-size="14" fill="white" 
          text-anchor="middle" font-weight="bold">5</text>
  </g>
  
  <!-- Info Popup -->
  <g transform="translate(380, 220)" filter="url(#shadow)">
    <rect x="0" y="0" width="140" height="50" rx="6" fill="#fff" opacity="0.95"/>
    <polygon points="70,50 75,58 65,58" fill="#fff" opacity="0.95"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="12" fill="#2D3748" 
          text-anchor="middle" font-weight="bold">天安门广场</text>
    <text x="70" y="38" font-family="Arial, sans-serif" font-size="10" fill="#718096" 
          text-anchor="middle">116.397, 39.916</text>
  </g>
  
  <!-- HTMap Logo/Badge -->
  <g transform="translate(50, 30)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="60" rx="12" fill="#2D3748" opacity="0.95"/>
    <text x="90" y="28" font-family="Arial, sans-serif" font-size="22" fill="#4B98FA" 
          text-anchor="middle" font-weight="bold">HTMap</text>
    <text x="90" y="48" font-family="Arial, sans-serif" font-size="11" fill="#A0AEC0" 
          text-anchor="middle">地图防腐层框架</text>
  </g>
  
  <!-- Engine Labels (Bottom) -->
  <g transform="translate(0, 540)" opacity="0.9">
    <rect x="80" y="0" width="140" height="45" rx="8" fill="#4B98FA" opacity="0.9" filter="url(#shadow)"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="13" fill="white" 
          text-anchor="middle" font-weight="bold">腾讯地图</text>
    <text x="150" y="38" font-family="Arial, sans-serif" font-size="9" fill="white" 
          text-anchor="middle" opacity="0.8">Tencent Map</text>
    
    <rect x="330" y="0" width="140" height="45" rx="8" fill="#667EEA" opacity="0.9" filter="url(#shadow)"/>
    <text x="400" y="25" font-family="Arial, sans-serif" font-size="13" fill="white" 
          text-anchor="middle" font-weight="bold">MapboxGL</text>
    <text x="400" y="38" font-family="Arial, sans-serif" font-size="9" fill="white" 
          text-anchor="middle" opacity="0.8">Mapbox GL JS</text>
    
    <rect x="580" y="0" width="140" height="45" rx="8" fill="#A855F7" opacity="0.9" filter="url(#shadow)"/>
    <text x="650" y="25" font-family="Arial, sans-serif" font-size="13" fill="white" 
          text-anchor="middle" font-weight="bold">四维图新</text>
    <text x="650" y="38" font-family="Arial, sans-serif" font-size="9" fill="white" 
          text-anchor="middle" opacity="0.8">MineMap</text>
  </g>
  
  <!-- Compass -->
  <g transform="translate(730, 80)">
    <circle cx="0" cy="0" r="35" fill="#fff" opacity="0.9" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#4B98FA" stroke-width="2"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="14" fill="#FF4757" 
          text-anchor="middle" font-weight="bold">N</text>
    <polygon points="0,-20 -4,-5 0,0 4,-5" fill="#FF4757"/>
    <polygon points="0,0 -4,15 0,20 4,15" fill="#CBD5E0"/>
    <text x="0" y="24" font-family="Arial, sans-serif" font-size="10" fill="#718096" 
          text-anchor="middle">S</text>
    <text x="-20" y="5" font-family="Arial, sans-serif" font-size="10" fill="#718096" 
          text-anchor="middle">W</text>
    <text x="20" y="5" font-family="Arial, sans-serif" font-size="10" fill="#718096" 
          text-anchor="middle">E</text>
  </g>
  
  <!-- Scale Bar -->
  <g transform="translate(50, 530)">
    <rect x="0" y="0" width="100" height="3" fill="#2D3748" opacity="0.6"/>
    <rect x="0" y="0" width="50" height="3" fill="#fff"/>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2D3748" 
          text-anchor="start">0</text>
    <text x="50" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2D3748" 
          text-anchor="middle">50km</text>
    <text x="100" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2D3748" 
          text-anchor="end">100km</text>
  </g>
</svg>
